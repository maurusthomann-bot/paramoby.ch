<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paramoby.ch – Mobilität für die Schweiz</title>
    <style>
        /* CSS direkt in der Datei für maximale Einfachheit */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --accent-color: #ffd700; /* BVB-inspiriertes dunkles Gold (dezent) */
            --sub-color: #666666;
            --font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif; /* Professionell & zeitlos */
        }

        body {
            font-family: var(--font-main);
            margin: 0;
            padding: 0;
            color: var(--text-color);
            background-color: var(--bg-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        header {
            margin-bottom: 40px;
        }

        /* Dein Logo-Platzhalter */
        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 700;
            border-bottom: 3px solid var(--accent-color); /* Dezenter BVB-Akzent */
            display: inline-block;
            padding-bottom: 5px;
        }

        .motto {
            font-size: 1.2rem;
            color: var(--sub-color);
            margin-top: 5px;
            font-weight: 300;
        }

        main {
            margin-bottom: 60px;
        }

        .intro {
            font-size: 1.3rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            font-weight: 500;
        }

        .points {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .point {
            background-color: #f9f9f9;
            padding: 15px 25px;
            border-radius: 8px;
            border-left: 5px solid var(--text-color);
            width: 100%;
            max-width: 500px;
            text-align: left;
            transition: transform 0.2s ease;
        }

        .point:hover {
            transform: translateX(5px);
        }

        .point-title {
            font-weight: 700;
            color: var(--text-color);
        }

        .point-text {
            color: var(--sub-color);
            font-size: 0.95rem;
        }

        footer {
            background-color: #000000;
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .contact-info {
            font-size: 1rem;
            font-weight: 400;
        }

        .contact-info a {
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            transition: color 0.3s ease;
        }

        .contact-info a:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .copyright {
            font-size: 0.8rem;
            margin-top: 15px;
            color: rgba(255,255,255,0.6);
        }

        /* Mobile Anpassung */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .container { padding: 15px; }
            .point { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="paramoby.ch Logo" class="logo">
            <h1>paramoby.ch</h1>
            <p class="motto">Mobilität ohne Grenzen</p>
