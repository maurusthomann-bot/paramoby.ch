<div style="background-color: #f5f5dc; padding: 15px; border: 1px solid #d2b48c; border-radius: 5px; font-family: monospace; white-space: pre-wrap; color: #333;">
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>paramoby.ch – Mobilität für die Schweiz</title>
<style>
:root {
--bg-color: #ffffff;
--text-color: #000000;
--accent-color: #ffd700;
--sub-color: #666666;
--font-main: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

    body {
        font-family: var(--font-main);
        margin: 0;
        padding: 0;
        color: var(--text-color);
        background-color: var(--bg-color);
        line-height: 1.6;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }

    .container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    header { margin-bottom: 40px; }

    .logo {
        max-width: 150px;
        height: auto;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 2.5rem;
        margin: 0;
        font-weight: 700;
        border-bottom: 3px solid var(--accent-color);
        display: inline-block;
        padding-bottom: 5px;
    }

    .motto {
        font-size: 1.2rem;
        color: var(--sub-color);
        margin-top: 5px;
        font-weight: 300;
    }

    main { margin-bottom: 60px; width: 100%; }

    .point {
        background-color: #f9f9f9;
        padding: 15px 25px;
        border-radius: 8px;
        border-left: 5px solid var(--text-color);
        width: 100%;
        max-width: 500px;
        text-align: left;
        margin: 15px auto;
        transition: transform 0.2s ease;
    }

    .point:hover { transform: translateX(5px); }

    .point-title { font-weight: 700; color: var(--text-color); }

    footer {
        background-color: #000000;
        color: #ffffff;
        padding: 30px 20px;
        text-align: center;
        margin-top: auto;
    }

    footer a {
        color: #ffffff;
        text-decoration: none;
        border-bottom: 1px solid rgba(255,255,255,0.3);
    }

    @media (max-width: 600px) {
        h1 { font-size: 2rem; }
        .container { padding: 15px; }
    }
</style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo.png" alt="paramoby.ch Logo" class="logo">
        <br>
        <h1>paramoby.ch</h1>
        <p class="motto">Mobilität ohne Grenzen</p>
    </header>

    <main>
        <div class="point">
            <div class="point-title">Import & Vertrieb</div>
            <div>Spezialisierte Rollstuhlsysteme für die Schweiz.</div>
        </div>
        <div class="point">
            <div class="point-title">Qualität & Service</div>
            <div>Zuverlässige Lösungen für individuelle Mobilität.</div>
        </div>
    </main>
</div>

<footer>
    <div class="contact-info">
        Kontakt: <a href="mailto:info@paramoby.ch">info@paramoby.ch</a>
    </div>
    <div class="copyright">
        &copy; 2026 paramoby.ch
    </div>
</footer>
</body>
</html>
</div>
