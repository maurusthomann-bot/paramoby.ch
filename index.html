<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paramoby.ch – Paramobilität</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        :root { --bg: #ffffff; --accent: #ffd700; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px; flex-grow: 1; }
        h1 { border-bottom: 3px solid var(--accent); display: inline-block; }
        .point { background: #f9f9f9; padding: 20px; margin: 15px 0; border-left: 5px solid #000; text-align: left; border-radius: 4px; }
        footer { padding: 40px; font-size: 0.85rem; border-top: 1px solid #eee; }
        .btn { color: #888; text-decoration: underline; cursor: pointer; background: none; border: none; font-size: 0.85rem; padding: 10px; }
        #box { display: none; margin-top: 20px; padding: 15px; border: 1px solid #ddd; background: #fafafa; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>paramoby.ch</h1>
    <p>Paramobilität ohne Grenzen</p>
    <div class="point"><strong>B2B Paramobilität:</strong> Vertrieb von Hilfsmitteln an den Fachhandel.</div>
    <div class="point"><strong>Schweizer Qualität:</strong> Import und Service für Rollstuhlsysteme.</div>
</div>

<footer>
    <button class="btn" onclick="show()">Rechtliche Hinweise anzeigen</button>
    
    <div id="box"></div>
    
    <p style="margin-top: 25px; color: #bbb;">&copy; 2026 paramoby.ch</p>
</footer>

<script>
    function show() {
        var element = document.getElementById("box");
        
        // Google-Schutz: Daten sind kodiert
        // n = Name, a = Adresse
        var n = "W2hpZXIgc3RlaHQgZGVpbiBOYW1lXQ=="; 
        var a = "W2hpZXIgc3RlaHQgZGVpbmUgQWRyZXNzZV0=";

        if (element.style.display === "none" || element.style.display === "") {
            // Schreibt den Text erst beim Klick rein
            element.innerHTML = "<strong>Impressum</strong><br>paramoby.ch<br>" + atob(n) + "<br>" + atob(a) + "<br>Schweiz<br>E-Mail: info@paramoby.ch";
            element.style.display = "block";
        } else {
            element.style.display = "none";
        }
    }
</script>

</body>
</html>
